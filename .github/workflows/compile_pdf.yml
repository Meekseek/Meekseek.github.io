name: Auto-Compile PDF Resume

on:
  push:
    branches:
      - main
    paths:
      - 'index.md'

permissions:
  contents: write

jobs:
  build-pdf:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PDF Generation Prerequisites
        run: |
          pip install markdown weasyprint

      - name: Compile Markdown to Professional PDF
        env:
          # 🌟 PULLS YOUR HIDDEN PHONE NUMBER SAFELY INTO THE TEMPORARY RUNNER
          REAL_PHONE: ${{ secrets.RECRUITER_PHONE }}
        run: |
          python -c '
          import os
          import markdown
          from weasyprint import HTML, CSS

          # Read raw markdown resume
          with open("index.md", "r", encoding="utf-8") as f:
              text = f.read()

          # Strip Jekyll front matter if present
          if text.startswith("---"):
              _, _, text = text.split("---", 2)

          # Convert to HTML structure
          raw_html = markdown.markdown(text)

          # Grab the phone number from the secure environment variable
          phone_number = os.environ.get("REAL_PHONE", "(###) ###-####")

          # Inject the real phone number right under the main title header programmatically
          header_addition = f"""
          <div style="text-align: center; margin-bottom: 12pt; font-size: 10pt;">
              Minnesota, USA | <a href="mailto:j.schoenick@pm.me">j.schoenick@pm.me</a> | {phone_number} | <a href="https://www.linkedin.com/in/jeremy-s-93686567">LinkedIn</a> | <a href="https://github.com/Meekseek">GitHub</a>
          </div>
          """

          # Apply professional typography styles for recruiters
          styled_html = f"""
          <html>
          <head>
          <style>
              @page {{ size: letter; margin: 0.6in; }}
              body {{ font-family: Arial, sans-serif; font-size: 11pt; line-height: 1.5; color: #222222; }}
              h3 {{ border-bottom: 2px solid #0056b3; color: #0056b3; margin-top: 16pt; margin-bottom: 6pt; text-transform: uppercase; font-size: 12pt; }}
              h4 {{ margin-top: 8pt; margin-bottom: 2pt; font-size: 11pt; font-weight: bold; }}
              ul {{ margin-top: 2pt; padding-left: 18px; }}
              li {{ margin-bottom: 4pt; }}
              a {{ color: #222222; text-decoration: none; }}
          </style>
          </head>
          <body>
              {header_addition}
              {raw_html}
          </body>
          </html>
          """

          # Render direct to clean PDF output
          HTML(string=styled_html).write_pdf("Jeremy_Schoenick_Cybersecurity_Resume.pdf")
          print("Successfully compiled secure resume PDF with phone deployment.")
          '

      - name: Commit and Push Generated PDF
        run: |
          git config --local user.email "pdf-compiler@github.com"
          git config --local user.name "Resume-PDF-Bot"
          git add Jeremy_Schoenick_Cybersecurity_Resume.pdf
          git diff-index --quiet HEAD || git commit -m "Automation: Compiled fresh professional resume PDF via Python compiler"
          git push
